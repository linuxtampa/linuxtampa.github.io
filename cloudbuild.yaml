steps:
  - name: 'node:lts'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:lts'
    entrypoint: 'npm'
    args: ['run', 'build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'storage'
      - 'rsync'
      - '_site/'
      - 'gs://linuxtampa.com'
      - '--recursive'
      - '--delete-unmatched-destination-objects'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'compute'
      - 'url-maps'
      - 'invalidate-cdn-cache'
      - 'website-url-map'
      - '--global'
      - '--path=/*'
