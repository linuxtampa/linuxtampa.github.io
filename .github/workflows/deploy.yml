name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Full github.com URLs so the runner fetches actions from GitHub. Shorthand
      # `actions/foo@ref` resolves to the Forgejo action mirror (data.forgejo.org),
      # which may not include every official GitHub action.
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Setup Node
        uses: https://github.com/actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Same layout as actions/upload-pages-artifact, but without that composite
      # (it calls actions/upload-artifact with shorthand, which would still hit the
      # Forgejo mirror). Pin upload-artifact to a release tag via full GitHub URL.
      - name: Archive site for Pages
        run: |
          tar --dereference --hard-dereference \
            --directory "_site" \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Pages artifact
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: https://github.com/actions/deploy-pages@v4
